<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PitchMark Checkout Complete</title>
    <script>
        (function () {
            const deepLink = "pitchmark://stripe/success";
            window.location.replace(deepLink);
            setTimeout(function () {
                const openButton = document.getElementById("open-app");
                if (openButton) {
                    openButton.setAttribute("href", deepLink);
                }
            }, 50);
        }());
    </script>
    <style>
        :root { color-scheme: light; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(29, 185, 84, 0.16), transparent 35%),
                linear-gradient(180deg, #f5f7fb 0%, #eef2f8 100%);
            color: #1c1c1e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .card {
            width: min(100% - 32px, 460px);
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 22px;
            padding: 32px 28px;
            box-shadow: 0 18px 40px rgba(17, 24, 39, 0.12);
            text-align: center;
        }
        .badge {
            width: 64px;
            height: 64px;
            border-radius: 999px;
            margin: 0 auto 18px;
            display: grid;
            place-items: center;
            background: #e8f8ee;
            color: #15803d;
            font-size: 32px;
            font-weight: 700;
        }
        h1 { margin: 0 0 10px; font-size: 28px; }
        p {
            margin: 0;
            color: #4b5563;
            line-height: 1.5;
        }
        .actions {
            margin-top: 24px;
            display: grid;
            gap: 12px;
        }
        a {
            display: inline-block;
            padding: 14px 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
        }
        .primary {
            background: #111827;
            color: white;
        }
        .secondary {
            color: #111827;
            background: #f3f4f6;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="badge">✓</div>
        <h1>Checkout complete</h1>
        <p>Your PitchMark order was submitted successfully. If the app did not reopen automatically, use the button below to jump back in.</p>
        <div class="actions">
            <a id="open-app" class="primary" href="pitchmark://stripe/success">Return to PitchMark</a>
            <a class="secondary" href="/">Open pitchmark.app</a>
        </div>
    </main>
</body>
</html>
