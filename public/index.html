<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PitchMark</title>
    <style>
        :root { color-scheme: light; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f6f7fb;
            color: #1c1c1e;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px 40px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
            width: min(100% - 32px, 420px);
            box-sizing: border-box;
        }
        .brand-image {
            display: block;
            width: min(100%, 220px);
            height: auto;
            margin: 0 auto 20px;
        }
        h1 { margin: 0 0 8px; font-size: 24px; }
        p { margin: 0; color: #6b7280; }
        @media (max-width: 480px) {
            .card { padding: 28px 24px; }
            .brand-image { width: min(100%, 180px); }
        }
    </style>
</head>
<body>
    <div class="card">
        <img
            class="brand-image"
            src="assets/softball%20baseball%20with%20title4.png"
            width="1024"
            height="1024"
            alt="PitchMark softball and baseball logo"
        />
        <h1>PitchMark</h1>
        <p>Auth link landing page is live.</p>
    </div>
</body>
</html>
