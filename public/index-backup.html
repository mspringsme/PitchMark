<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PitchMark</title>
    <style>
        :root { color-scheme: light; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f6f7fb;
            color: #1c1c1e;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px 40px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { margin: 0 0 8px; font-size: 24px; }
        p { margin: 0; color: #6b7280; }
    </style>
</head>
<body>
    <div class="card">
        <h1>PitchMark</h1>
        <p>Auth link landing page is live.</p>
    </div>
</body>
</html>
